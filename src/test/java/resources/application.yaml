spring:
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  properties:
    hibernate:
      globally_qhoted_identifiers: true
  flyway:
    enabled: true
    locations: classpath:db/migratinon-test

server:
  error:
    include-message: always
    include-binding-errors: always

brasil-api:
  base-url: ${BRASIL_API_BASE_URL:https://brasilapi.com.br/api}
  cep-uri: ${BRASIL_API_URI:/cep/v1/{cep}}
